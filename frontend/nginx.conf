server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /predict {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        client_max_body_size 25M;
    }
    location /health {
        proxy_pass http://backend:8080;
    }
    location /model {
        proxy_pass http://backend:8080;
    }
}
