<!DOCTYPE html>
<html>
<head>
    <title>Pneumonia Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .upload-section {
            text-align: center;
        }

        input {
            margin: 15px 0;
        }

        img {
            margin-top: 15px;
            max-width: 300px;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .result {
            margin-top: 30px;
            text-align: center;
        }

        .normal {
            color: green;
            font-weight: bold;
        }

        .pneumonia {
            color: red;
            font-weight: bold;
        }

        .confidence {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    AI Chest X-ray Pneumonia Detection
</header>

<div class="container">

    <h2>Upload X-ray Image</h2>

    <div class="upload-section">
        <input type="file" id="fileInput"><br>

        <img id="preview" style="display:none;"><br>

        <button onclick="uploadImage()">Analyze</button>
    </div>

    <div class="result" id="result">
        Result will appear here
    </div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});

async function uploadImage() {
    const resultDiv = document.getElementById("result");

    if (!fileInput.files.length) {
        alert("Please select an image");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    resultDiv.innerHTML = "Processing...";

    try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        let className = data.prediction === "PNEUMONIA" ? "pneumonia" : "normal";

        resultDiv.innerHTML = `
            <div class="${className}">
                Prediction: ${data.prediction}
            </div>
            <div class="confidence">
                Confidence: ${(data.confidence * 100).toFixed(2)}%
            </div>
        `;

    } catch (error) {
        resultDiv.innerHTML = "Error occurred!";
    }
}
</script>

</body>
</html>
